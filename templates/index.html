<!DOCTYPE html>
<html lang="en">
<head>
    <title>ForexMate</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: white;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            justify-content: space-between;
            padding: 15px 20px;
            background: #111827;
        }

        .chat {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .msg {
            margin: 10px 0;
            padding: 12px;
            border-radius: 10px;
            max-width: 70%;
        }

        .user {
            background: #22c55e;
            margin-left: auto;
        }

        .bot {
            background: #374151;
        }

        .input-box {
            display: flex;
            padding: 10px;
            background: #111827;
        }

        input {
            flex: 1;
            padding: 10px;
            border-radius: 8px;
            border: none;
        }

        button {
            margin-left: 10px;
            padding: 10px 15px;
            background: #22c55e;
            border: none;
            border-radius: 8px;
            color: white;
        }

        .telegram {
            display: flex;
            align-items: center;
            gap: 5px;
            color: #38bdf8;
            text-decoration: none;
        }
    </style>
</head>

<body>

<div class="header">
    <h2>ForexMate</h2>
    <a class="telegram" href="https://t.me/ForexMate_bot" target="_blank">
        <img src="https://cdn-icons-png.flaticon.com/512/2111/2111646.png" width="18">
        Telegram
    </a>
</div>

<div class="chat" id="chat"></div>

<div class="input-box">
    <input id="input" placeholder="Type: 1 usd to inr">
    <button onclick="send()">Send</button>
</div>

<script>
async function send() {
    let input = document.getElementById("input");
    let chat = document.getElementById("chat");

    let text = input.value;
    if (!text) return;

    chat.innerHTML += `<div class="msg user">${text}</div>`;
    input.value = "";

    let res = await fetch("/webhook", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({query: text})
    });

    let data = await res.json();

    chat.innerHTML += `<div class="msg bot">${data.fulfillmentText}</div>`;
    chat.scrollTop = chat.scrollHeight;
}
</script>

</body>
</html>
